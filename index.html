function disp(code){return T[code]?T[code]:[code,"⚽"]}

function isLocked(m){
  if(!m.time)return false; // الإقصائيات بدون وقت محدد → ما تتقفل بالوقت
  const start=new Date(m.time+":00+03:00").getTime();
  return Date.now()>=start;
}
function scoreP(pred,act){
  if(!act||act.h==null||act.a==null)return null;
  if(!pred||pred.h==null||pred.a==null)return 0;
  if(pred.h===act.h&&pred.a===act.a)return 3;
  if(Math.sign(pred.h-pred.a)===Math.sign(act.h-act.a))return 1;
  return 0;
}

function pick(p){state.me=p;localStorage.setItem("kas_me",p);render()}
function logout(){state.me=null;localStorage.removeItem("kas_me");render()}
async function savePred(id,h,a){
  const m=ALL.find(x=>x.id===id);
  if(m&&isLocked(m)&&!(state.results[id]&&state.results[id].h!=null)){toast("🔒 بدأت المباراة، ما تقدر تعدّل");render();return}
  try{await set(ref(db,`predictions/${state.me}/${id}`),{h,a});toast("انحفظ توقعك ✓")}catch(e){console.error(e);toast("صار خطأ، حاول مرة ثانية")}
}
async function saveRes(id,h,a){try{await set(ref(db,`results/${id}`),(h==null||a==null)?null:{h,a});toast("اعتُمدت النتيجة ✓")}catch(e){console.error(e)}}

function standings(){
  return PLAYERS.map(pl=>{let pts=0,exact=0,dir=0,played=0;
    ALL.forEach(m=>{const s=scoreP(state.predictions[pl]?.[m.id],state.results[m.id]);if(s!=null){pts+=s;played++;if(s===3)exact++;else if(s===1)dir++}});
    const base=BASE[pl]||0;
    return{pl,pts:base+pts,newPts:pts,base,exact,dir,played};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

  <nav style="display:flex;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04);position:sticky;top:0;z-index:5">
    <button class="tabBtn" data-tab="matches" style="${tabStyle(state.tab==="matches")}">⚽ المباريات</button>
    <button class="tabBtn" data-tab="table" style="${tabStyle(state.tab==="table")}">🏆 الترتيب</button>
  </nav>
  <main style="max-width:660px;margin:0 auto;padding:16px">${state.tab==="matches"?renderMatches():renderTable(st,finishedCount)}</main>
  <footer style="text-align:center;padding:24px 16px;color:#9aa6a0;font-size:13px;font-weight:600">صُنع لـ سعيد · منصور · خالد · عاصم · عزوز 🏠</footer>`;
  bind();
}
function stat(label,value,hot){return `<div style="flex:1;text-align:center;padding:10px 4px;border-left:1px solid rgba(255,255,255,.08)"><div style="font-size:20px;font-weight:900;${hot?`color:${GOLD}`:""}">${esc(value)}</div><div style="font-size:11px;opacity:.7">${label}</div></div>`}
function tabStyle(on){return `flex:1;padding:15px;border:none;background:transparent;font-size:15px;font-weight:${on?900:700};color:${on?GRN:"#9aa6a0"};${on?`border-bottom:3px solid ${GOLD}`:""}`}

function renderMatches(){
  let vis;
  if(state.filter==="all")vis=ALL;
  else if(state.filter==="KO")vis=KNOCKOUT;
  else if(state.filter==="R1")vis=MATCHES.filter(m=>m.round===1);
  else if(state.filter==="R2")vis=MATCHES.filter(m=>m.round===2);
  else if(state.filter==="R3")vis=MATCHES.filter(m=>m.round===3);
  else vis=MATCHES.filter(m=>m.group===state.filter);
  // صف فلتر المجموعات
  let chips=`<button class="chip" data-f="all" style="${chipStyle(state.filter==="all")}">الكل</button>`;
  GROUPS.forEach(g=>chips+=`<button class="chip" data-f="${g}" style="${chipStyle(state.filter===g)}">${g}</button>`);
  chips+=`<button class="chip" data-f="KO" style="${chipStyle(state.filter==="KO")}">🏆 الإقصائيات</button>`;
  // صف فلتر الجولات
  let rounds=`<button class="chip" data-f="R1" style="${chipStyle(state.filter==="R1")}">الجولة 1</button>`+
             `<button class="chip" data-f="R2" style="${chipStyle(state.filter==="R2")}">الجولة 2</button>`+
             `<button class="chip" data-f="R3" style="${chipStyle(state.filter==="R3")}">الجولة 3</button>`;
  // فاصل بين الأيام
  let lastDate=null,html="";
  vis.forEach(m=>{
    if(m.date!==lastDate){html+=`<div style="margin:18px 4px 8px;font-weight:800;color:${GRN};font-size:15px">📅 ${m.date}${m.ko?` <span style="color:${GOLDD};font-size:12px">· ${m.round}</span>`:""}</div>`;lastDate=m.date}
    html+=card(m);
  });
  return `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px">
    <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:4px"><span style="flex-shrink:0;font-size:12px;font-weight:800;color:#9aa6a0;align-self:center;margin-left:4px">مجموعات:</span>${chips}</div>
    <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:8px"><span style="flex-shrink:0;font-size:12px;font-weight:800;color:#9aa6a0;align-self:center;margin-left:4px">جولات:</span>${rounds}</div>
  </div>
  <div style="display:grid;gap:14px">${html}</div>
  <div style="text-align:center;font-size:13px;color:#5a6b63;background:#fff;padding:16px;border-radius:14px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)"><b>نظام النقاط:</b> نتيجة مظبوطة <span style="background:#d3f3e2;color:#0a7d4f;padding:1px 7px;border-radius:6px;font-weight:800">+3</span> · الفايز صح والنتيجة غلط <span style="background:#fcefc7;color:#9a7b10;padding:1px 7px;border-radius:6px;font-weight:800">+1</span> · غلط <span style="background:#eee;color:#999;padding:1px 7px;border-radius:6px;font-weight:800">0</span></div>`;
}
function chipStyle(on){return `flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid ${on?GRN:"#d5d8cf"};background:${on?GRN:"#fff"};color:${on?CREAM:"#6a766f"};font-weight:${on?800:700};font-size:14px`}

function card(m){
  const isKO=m.ko;
  const[home,hf]=isKO?[m.home,"🏟️"]:disp(m.home);
  const[away,af]=isKO?[m.away,"🏟️"]:disp(m.away);
  const res=state.results[m.id];
  const fin=res&&res.h!=null;
  const myPred=state.predictions[state.me]?.[m.id];
  const myScore=scoreP(myPred,res);
  const isAdmin=state.me===ADMIN;
  const formOpen=openForms[m.id]==="pred";
  const adminOpen=openForms[m.id]==="admin";
  const locked=!fin&&isLocked(m); // المباراة بدأت بس ما لها نتيجة بعد
  let othersHtml="";
  if(fin){
    const others=PLAYERS.map(p=>({p,pr:state.predictions[p]?.[m.id]})).filter(x=>x.pr);
    if(others.length)othersHtml=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">`+others.map(({p,pr})=>{const sc=scoreP(pr,res);const col=sc===3?"#0a7d4f":sc===1?"#b8860b":"#aaa";const mine=p===state.me;return `<span style="background:${mine?"#e3f1ea":CREAM};${mine?`border:1px solid ${GRN}`:""};font-size:12px;padding:4px 10px;border-radius:9px;font-weight:700;color:#5a6b63">${esc(p)} ${pr.h}-${pr.a}<b style="color:${col};margin-right:3px">+${sc}</b></span>`}).join("")+`</div>`;
  }
  const headerLabel=isKO?`<span style="background:${GOLD};color:${GD};padding:3px 11px;border-radius:9px;font-weight:800">${m.round}</span>`:`<span style="background:${GRN};color:${CREAM};padding:3px 11px;border-radius:9px;font-weight:800">المجموعة ${m.group}</span>`;
  return `<div class="cardIn" style="background:${fin?"linear-gradient(180deg,#fff,#fbfdfb)":"#fff"};border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(10,60,40,.06);border:1px solid ${isKO?"#efe4c4":(fin?"#dcefe4":"#eef0e8")}">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#8a9690;margin-bottom:12px">${headerLabel}<span style="font-weight:600">📅 ${m.date}${m.time?` · ${m.time.slice(11)}`:""}</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px"><span style="font-size:${isKO?"26px":"36px"};line-height:1">${hf}</span><span style="text-align:center;font-weight:800;font-size:${isKO?"12px":"14px"};color:${GD}">${home}</span></div>
      <div style="min-width:70px;display:flex;justify-content:center">${fin?`<div style="font-size:26px;font-weight:900;color:${GRN};display:flex;align-items:center;gap:2px">${res.h}<span style="color:#c2cac5;margin:0 4px;font-size:20px">-</span>${res.a}</div>`:`<div style="color:#c2cac5;font-size:16px;font-weight:900;letter-spacing:1px">VS</div>`}</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px"><span style="font-size:${isKO?"26px":"36px"};line-height:1">${af}</span><span style="text-align:center;font-weight:800;font-size:${isKO?"12px":"14px"};color:${GD}">${away}</span></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px dashed #e0e4da;font-size:14px">
      ${myPred?`<span style="color:${GD}">توقعك: <b>${myPred.h} - ${myPred.a}</b>${fin?badge(myScore):""}</span>`:`<span style="color:#aab4ae;font-size:13px">${locked?"⏳ ما توقعت":"⏳ ما توقعت بعد"}</span>`}
      ${fin?"":locked?`<span style="background:#f3e3e3;color:#b04444;padding:6px 14px;border-radius:11px;font-weight:800;font-size:13px">🔒 بدأت المباراة</span>`:`<button class="predBtn" data-id="${m.id}" style="background:${GRN};color:${CREAM};border:none;padding:8px 18px;border-radius:11px;font-weight:800;font-size:14px">${myPred?"✏️ تعديل":"🎯 توقّع"}</button>`}
    </div>
    ${formOpen&&!fin&&!locked?predForm(m,home,away,hf,af,myPred):""}
    ${othersHtml}
    ${isAdmin?adminSection(m,res,fin,adminOpen):""}
  </div>`;
}
function badge(s){const bg=s===3?"#d3f3e2":s===1?"#fcefc7":"#eee";const c=s===3?"#0a7d4f":s===1?"#9a7b10":"#999";return `<span class="${s>0?"pulse":""}" style="display:inline-block;margin-right:8px;font-size:12px;padding:2px 9px;border-radius:9px;font-weight:900;background:${bg};color:${c}">+${s}</span>`}
function predForm(m,home,away,hf,af,mp){return `<div class="slideDown predForm" data-id="${m.id}" style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center;background:${CREAM};padding:12px;border-radius:12px"><span style="font-size:12px;color:#5a6b63;font-weight:700">${hf} ${home}</span><input type="number" min="0" class="ph" value="${mp?.h??""}" style="${numStyle()}"><span style="font-weight:900;color:#aab">-</span><input type="number" min="0" class="pa" value="${mp?.a??""}" style="${numStyle()}"><span style="font-size:12px;color:#5a6b63;font-weight:700">${away} ${af}</span><button class="predSave" data-id="${m.id}" style="background:${GOLD};color:${GD};border:none;padding:9px 18px;border-radius:11px;font-weight:900">حفظ</button></div>`}
function adminSection(m,res,fin,open){
  if(!open)return `<div style="margin-top:12px;padding-top:12px;border-top:2px dashed ${GOLD}"><button class="adminToggle" data-id="${m.id}" style="width:100%;background:transparent;color:${GOLDD};border:1.5px dashed ${GOLD};padding:9px;border-radius:11px;font-weight:800;font-size:13px">⚖️ ${fin?"تعديل النتيجة":"إدخال النتيجة الفعلية"}</button></div>`;
  return `<div style="margin-top:12px;padding-top:12px;border-top:2px dashed ${GOLD}"><div class="slideDown" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;background:#fdfaf0;padding:12px;border-radius:12px"><span style="font-size:13px;font-weight:800;color:${GOLDD}">النتيجة:</span><input type="number" min="0" class="rh" value="${res?.h??""}" style="${numStyle()}"><span style="font-weight:900;color:#aab">-</span><input type="number" min="0" class="ra" value="${res?.a??""}" style="${numStyle()}"><button class="adminSave" data-id="${m.id}" style="background:${GRN};color:${CREAM};border:none;padding:9px 16px;border-radius:11px;font-weight:800">اعتماد</button><button class="adminCancel" data-id="${m.id}" style="background:transparent;color:#9aa6a0;border:none;padding:9px 8px;font-weight:700">إلغاء</button></div></div>`;
}
function numStyle(){return `width:50px;padding:9px;text-align:center;border:1.5px solid #cdd2c8;border-radius:10px;font-size:17px;font-weight:800;font-family:inherit;color:${GRN}`}

function renderTable(st,finishedCount){
  const medals=["🥇","🥈","🥉"];const heights=[110,80,64];const orders=[1,0,2];
  let pod="";
  st.slice(0,3).forEach((s,i)=>{pod+=`<div style="display:flex;flex-direction:column;align-items:center;width:80px;order:${orders[i]}"><div style="font-weight:800;font-size:14px;margin-bottom:4px;color:${GD}">${esc(s.pl)}</div><div style="font-size:26px;margin-bottom:4px">${medals[i]}</div><div class="growBar" style="width:100%;height:${heights[i]}px;background:linear-gradient(180deg,${GRN},${GD});border-radius:10px 10px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px"><span style="color:${GOLD};font-weight:900;font-size:20px">${s.pts}</span></div></div>`});
  let rows="";
  st.forEach((s,i)=>{const lead=i===0&&s.pts>0;const me=s.pl===state.me;rows+=`<div style="display:flex;align-items:center;gap:12px;padding:13px 10px;border-bottom:1px solid #f0ede3;border-radius:12px;${lead?"background:linear-gradient(90deg,#fdf6e0,#fff)":""};${me?"box-shadow:inset 0 0 0 1.5px #e3f1ea":""}"><div style="width:30px;height:30px;border-radius:50%;background:${lead?GOLD:"#eef0e8"};color:${lead?GD:GRN};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0">${i+1}</div><div style="flex:1;font-weight:800;color:${GD}">${esc(s.pl)}${me?`<span style="background:${GRN};color:${CREAM};font-size:10px;padding:1px 7px;border-radius:6px;margin-right:6px;font-weight:700">أنت</span>`:""}<div style="font-size:11px;color:#9aa6a0;font-weight:500;margin-top:2px">رصيد ${s.base} + جديد ${s.newPts} · ${s.exact} مظبوطة · ${s.dir} اتجاه</div></div><div style="font-size:26px;font-weight:900;color:${GRN};text-align:center;line-height:1">${s.pts}<span style="display:block;font-size:10px;color:#9aa6a0;font-weight:500">نقطة</span></div></div>`});
  return `<div style="background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 10px rgba(10,60,40,.06)"><h2 style="margin:0 0 18px;color:${GRN};font-weight:900;text-align:center">🏆 لوحة الصدارة</h2><div style="display:flex;justify-content:center;align-items:flex-end;gap:10px;margin-bottom:26px;min-height:150px">${pod}</div>${rows}${finishedCount===0?`<p style="text-align:center;color:#9aa6a0;margin-top:20px;font-size:14px;line-height:1.8">لسا ما انتهت ولا مباراة 🕐<br>أول ما يحط الحَكَم نتيجة بتبان النقاط هنا.</p>`:""}</div>`;
}
function renderPick(root){
  let btns="";PLAYERS.forEach((p,i)=>{btns+=`<button class="pickBtn pop" data-p="${esc(p)}" style="animation-delay:${i*0.07}s;padding:18px;font-size:19px;font-weight:800;background:#fff;color:${GRN};border:2px solid ${GRN};border-radius:16px;display:flex;justify-content:center;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(10,92,62,.08)"><span>${esc(p)}</span>${p===ADMIN?`<span style="background:${GOLD};color:${GD};font-size:11px;padding:2px 8px;border-radius:8px;font-weight:800">الحَكَم</span>`:""}</button>`});
  root.innerHTML=`<div style="max-width:440px;margin:0 auto;padding:50px 24px;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center"><div class="float" style="font-size:72px;display:inline-block">⚽</div><h1 style="font-size:42px;margin:10px 0 0;color:${GRN};font-weight:900;letter-spacing:-1px">كأس الشقة</h1><div style="font-size:22px;color:${GOLD};font-weight:900;letter-spacing:6px;margin-bottom:10px">2026</div><p style="color:#5a6b63;margin-bottom:34px;font-size:15px;line-height:1.7">توقّعوا نتائج المونديال — واللي يجمع نقاط أكثر يكسب 🏆</p><div style="font-size:14px;color:#8a9690;margin-bottom:14px;font-weight:700">مين أنت؟</div><div style="display:grid;gap:12px">${btns}</div></div>`;
  root.querySelectorAll(".pickBtn").forEach(b=>b.onclick=()=>pick(b.dataset.p));
}
function bind(){
  const root=document.getElementById("root");
  root.querySelector("#logout").onclick=logout;
  root.querySelectorAll(".tabBtn").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});
  root.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{state.filter=b.dataset.f;render()});
  root.querySelectorAll(".predBtn").forEach(b=>b.onclick=()=>{const id=b.dataset.id;openForms[id]=openForms[id]==="pred"?null:"pred";render()});
  root.querySelectorAll(".predSave").forEach(b=>b.onclick=()=>{const wrap=root.querySelector(`.predForm[data-id="${b.dataset.id}"]`);const h=wrap.querySelector(".ph").value,a=wrap.querySelector(".pa").value;if(h===""||a==="")return;openForms[b.dataset.id]=null;savePred(b.dataset.id,Number(h),Number(a))});
  root.querySelectorAll(".adminToggle").forEach(b=>b.onclick=()=>{openForms[b.dataset.id]="admin";render()});
  root.querySelectorAll(".adminCancel").forEach(b=>b.onclick=()=>{openForms[b.dataset.id]=null;render()});
  root.querySelectorAll(".adminSave").forEach(b=>b.onclick=()=>{const card=b.closest("div").parentElement;const rh=card.querySelector(".rh").value,ra=card.querySelector(".ra").value;openForms[b.dataset.id]=null;if(rh===""||ra==="")saveRes(b.dataset.id,null,null);else saveRes(b.dataset.id,Number(rh),Number(ra))});
}
render();
</script>
</body>
</html>
