<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>كأس الشقة 2026 ⚽</title>
<meta name="theme-color" content="#0a5c3e" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Tahoma,sans-serif;background:linear-gradient(160deg,#f7f5ee,#eef0e8);color:#073d29;min-height:100vh}
button{font-family:inherit;cursor:pointer}
button:active{transform:scale(.96)}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
.float{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-14px) rotate(5deg)}}
.pop{opacity:0;animation:pop .5s cubic-bezier(.2,.9,.3,1.3) forwards}
@keyframes pop{from{opacity:0;transform:scale(.8) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.cardIn{animation:cardIn .4s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slideDown{animation:slideDown .25s ease both}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse .6s ease}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.growBar{animation:grow .7s cubic-bezier(.2,.9,.3,1.2) both;transform-origin:bottom}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.toastIn{animation:toastIn .3s ease both}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzfxCONKtrwy-Qup3Y0xIzWtH2DM7Y_dk",
  authDomain: "shaqqa-al5se.firebaseapp.com",
  databaseURL: "https://shaqqa-al5se-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shaqqa-al5se",
  storageBucket: "shaqqa-al5se.firebasestorage.app",
  messagingSenderId: "1094961833478",
  appId: "1:1094961833478:web:e0fa31873ec87aed7fc587",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PLAYERS = ["سعيد","منصور","خالد","عاصم","عزوز"];
const ADMIN = "سعيد";
const T = {
  MEX:["المكسيك","🇲🇽"],RSA:["جنوب أفريقيا","🇿🇦"],KOR:["كوريا الجنوبية","🇰🇷"],CZE:["تشيكيا","🇨🇿"],
  CAN:["كندا","🇨🇦"],BIH:["البوسنة","🇧🇦"],QAT:["قطر","🇶🇦"],SUI:["سويسرا","🇨🇭"],
  BRA:["البرازيل","🇧🇷"],MAR:["المغرب","🇲🇦"],HAI:["هايتي","🇭🇹"],SCO:["اسكتلندا","🏴󠁧󠁢󠁳󠁣󠁴󠁿"],
  USA:["أمريكا","🇺🇸"],PAR:["باراغواي","🇵🇾"],AUS:["أستراليا","🇦🇺"],TUR:["تركيا","🇹🇷"],
  GER:["ألمانيا","🇩🇪"],CUW:["كوراساو","🇨🇼"],CIV:["ساحل العاج","🇨🇮"],ECU:["الإكوادور","🇪🇨"],
  NED:["هولندا","🇳🇱"],JPN:["اليابان","🇯🇵"],SWE:["السويد","🇸🇪"],TUN:["تونس","🇹🇳"],
  BEL:["بلجيكا","🇧🇪"],EGY:["مصر","🇪🇬"],IRN:["إيران","🇮🇷"],NZL:["نيوزيلندا","🇳🇿"],
  ESP:["إسبانيا","🇪🇸"],CPV:["الرأس الأخضر","🇨🇻"],KSA:["السعودية","🇸🇦"],URU:["الأوروغواي","🇺🇾"],
  FRA:["فرنسا","🇫🇷"],SEN:["السنغال","🇸🇳"],IRQ:["العراق","🇮🇶"],NOR:["النرويج","🇳🇴"],
  ARG:["الأرجنتين","🇦🇷"],ALG:["الجزائر","🇩🇿"],AUT:["النمسا","🇦🇹"],JOR:["الأردن","🇯🇴"],
  POR:["البرتغال","🇵🇹"],COD:["الكونغو الد.","🇨🇩"],UZB:["أوزبكستان","🇺🇿"],COL:["كولومبيا","🇨🇴"],
  ENG:["إنجلترا","🏴󠁧󠁢󠁥󠁮󠁧󠁿"],CRO:["كرواتيا","🇭🇷"],GHA:["غانا","🇬🇭"],PAN:["بنما","🇵🇦"],
};
let _id=0;
const MK=(date,group,home,away)=>({id:"m"+(++_id),date,group,home,away});
const MATCHES=[
MK("11 يونيو","A","MEX","RSA"),MK("11 يونيو","A","KOR","CZE"),
MK("12 يونيو","B","CAN","BIH"),MK("12 يونيو","D","USA","PAR"),
MK("12 يونيو","B","QAT","SUI"),MK("12 يونيو","D","AUS","TUR"),
MK("13 يونيو","C","BRA","MAR"),MK("13 يونيو","C","HAI","SCO"),
MK("13 يونيو","E","GER","CUW"),MK("13 يونيو","E","CIV","ECU"),
MK("14 يونيو","F","NED","JPN"),MK("14 يونيو","F","SWE","TUN"),
MK("14 يونيو","G","BEL","EGY"),MK("14 يونيو","G","IRN","NZL"),
MK("15 يونيو","H","ESP","CPV"),MK("15 يونيو","H","KSA","URU"),
MK("15 يونيو","I","FRA","SEN"),MK("15 يونيو","I","IRQ","NOR"),
MK("16 يونيو","J","ARG","ALG"),MK("16 يونيو","J","AUT","JOR"),
MK("16 يونيو","K","POR","COD"),MK("16 يونيو","K","UZB","COL"),
MK("17 يونيو","L","ENG","CRO"),MK("17 يونيو","L","GHA","PAN"),
MK("18 يونيو","A","CZE","RSA"),MK("18 يونيو","A","MEX","KOR"),
MK("18 يونيو","B","SUI","BIH"),MK("18 يونيو","B","CAN","QAT"),
MK("19 يونيو","C","BRA","HAI"),MK("19 يونيو","C","SCO","MAR"),
MK("19 يونيو","D","USA","AUS"),MK("19 يونيو","D","PAR","TUR"),
MK("20 يونيو","E","GER","CIV"),MK("20 يونيو","E","ECU","CUW"),
MK("20 يونيو","F","NED","SWE"),MK("20 يونيو","F","TUN","JPN"),
MK("21 يونيو","G","BEL","IRN"),MK("21 يونيو","G","NZL","EGY"),
MK("21 يونيو","H","ESP","KSA"),MK("21 يونيو","H","URU","CPV"),
MK("22 يونيو","I","FRA","IRQ"),MK("22 يونيو","I","NOR","SEN"),
MK("22 يونيو","J","ARG","AUT"),MK("22 يونيو","J","JOR","ALG"),
MK("23 يونيو","K","POR","UZB"),MK("23 يونيو","K","COL","COD"),
MK("23 يونيو","L","ENG","GHA"),MK("23 يونيو","L","PAN","CRO"),
MK("24 يونيو","A","RSA","KOR"),MK("24 يونيو","A","CZE","MEX"),
MK("24 يونيو","B","BIH","CAN"),MK("24 يونيو","B","SUI","QAT"),
MK("25 يونيو","D","TUR","USA"),MK("25 يونيو","D","PAR","AUS"),
MK("25 يونيو","C","MAR","HAI"),MK("25 يونيو","C","SCO","BRA"),
MK("25 يونيو","E","CUW","CIV"),MK("25 يونيو","E","ECU","GER"),
MK("26 يونيو","F","JPN","SWE"),MK("26 يونيو","F","TUN","NED"),
MK("26 يونيو","G","EGY","IRN"),MK("26 يونيو","G","NZL","BEL"),
MK("26 يونيو","H","CPV","KSA"),MK("26 يونيو","H","URU","ESP"),
MK("27 يونيو","I","SEN","IRQ"),MK("27 يونيو","I","NOR","FRA"),
MK("27 يونيو","J","ALG","AUT"),MK("27 يونيو","J","JOR","ARG"),
MK("27 يونيو","K","COL","POR"),MK("27 يونيو","K","COD","UZB"),
MK("27 يونيو","L","PAN","ENG"),MK("27 يونيو","L","CRO","GHA"),
];
const GROUPS="ABCDEFGHIJKL".split("");

const G="#0a5c3e",GD="#073d29",GOLD="#d4af37",GOLDD="#b8941f",CREAM="#f7f5ee";

function scoreP(pred,act){
  if(!act||act.h==null||act.a==null)return null;
  if(!pred||pred.h==null||pred.a==null)return 0;
  if(pred.h===act.h&&pred.a===act.a)return 3;
  if(Math.sign(pred.h-pred.a)===Math.sign(act.h-act.a))return 1;
  return 0;
}

let state={me:localStorage.getItem("kas_me")||null,predictions:{},results:{},tab:"matches",filter:"all"};
const openForms={};

onValue(ref(db,"predictions"),s=>{state.predictions=s.val()||{};render()});
onValue(ref(db,"results"),s=>{state.results=s.val()||{};render()});

function toast(msg){
  let t=document.createElement("div");
  t.className="toastIn";
  t.style.cssText=`position:fixed;top:14px;left:50%;transform:translateX(-50%);background:${GD};color:${CREAM};padding:10px 22px;border-radius:30px;font-weight:800;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.2);font-size:14px`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),1600);
}
function pick(p){state.me=p;localStorage.setItem("kas_me",p);render()}
function logout(){state.me=null;localStorage.removeItem("kas_me");render()}
async function savePred(id,h,a){try{await set(ref(db,`predictions/${state.me}/${id}`),{h,a});toast("انحفظ توقعك ✓")}catch(e){console.error(e);toast("صار خطأ، حاول مرة ثانية")}}
async function saveRes(id,h,a){try{await set(ref(db,`results/${id}`),(h==null||a==null)?null:{h,a});toast("اعتُمدت النتيجة ✓")}catch(e){console.error(e)}}

function standings(){
  return PLAYERS.map(pl=>{
    let pts=0,exact=0,dir=0,played=0;
    MATCHES.forEach(m=>{const s=scoreP(state.predictions[pl]?.[m.id],state.results[m.id]);if(s!=null){pts+=s;played++;if(s===3)exact++;else if(s===1)dir++}});
    return{pl,pts,exact,dir,played};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function render(){
  const root=document.getElementById("root");
  if(!state.me){renderPick(root);return}
  const st=standings();
  const finishedCount=Object.keys(state.results).filter(k=>state.results[k]?.h!=null).length;
  const myPredCount=Object.keys(state.predictions[state.me]||{}).length;
  const myPts=st.find(s=>s.pl===state.me)?.pts??0;

  root.innerHTML=`
  <header style="position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,${G},${GD});color:${CREAM};padding:18px 20px">
    <div style="position:absolute;top:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(212,175,55,.35),transparent 70%);border-radius:50%"></div>
    <div style="position:relative;z-index:1">
      <div style="font-size:21px;font-weight:900">كأس الشقة <span style="color:${GOLD}">2026</span> ⚽</div>
      <div style="font-size:13px;opacity:.9;margin-top:3px">أهلاً <b>${esc(state.me)}</b>${state.me===ADMIN?`<span style="background:${GOLD};color:${GD};font-size:11px;padding:2px 8px;border-radius:8px;font-weight:800;margin-right:6px">الحَكَم</span>`:""}</div>
    </div>
    <button id="logout" style="position:relative;z-index:1;background:rgba(255,255,255,.12);color:${CREAM};border:1px solid rgba(255,255,255,.4);padding:8px 16px;border-radius:12px;font-weight:700">تبديل</button>
  </header>
  <div style="display:flex;background:${GD};color:${CREAM}">
    ${stat("مبارياتك",`${myPredCount}/${MATCHES.length}`)}
    ${stat("انتهت",`${finishedCount}/${MATCHES.length}`)}
    ${stat("نقاطك",myPts,true)}
  </div>
  <nav style="display:flex;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04);position:sticky;top:0;z-index:5">
    <button class="tabBtn" data-tab="matches" style="${tabStyle(state.tab==="matches")}">⚽ المباريات</button>
    <button class="tabBtn" data-tab="table" style="${tabStyle(state.tab==="table")}">🏆 الترتيب</button>
  </nav>
  <main style="max-width:660px;margin:0 auto;padding:16px">
    ${state.tab==="matches"?renderMatches():renderTable(st,finishedCount)}
  </main>
  <footer style="text-align:center;padding:24px 16px;color:#9aa6a0;font-size:13px;font-weight:600">صُنع لـ سعيد · منصور · خالد · عاصم · عزوز 🏠</footer>
  `;
  bind();
}

function stat(label,value,hot){
  return `<div style="flex:1;text-align:center;padding:10px 4px;border-left:1px solid rgba(255,255,255,.08)">
    <div style="font-size:20px;font-weight:900;${hot?`color:${GOLD}`:""}">${esc(value)}</div>
    <div style="font-size:11px;opacity:.7">${label}</div></div>`;
}
function tabStyle(on){return `flex:1;padding:15px;border:none;background:transparent;font-size:15px;font-weight:${on?900:700};color:${on?G:"#9aa6a0"};${on?`border-bottom:3px solid ${GOLD}`:""}`}

function renderMatches(){
  const vis=state.filter==="all"?MATCHES:MATCHES.filter(m=>m.group===state.filter);
  let chips=`<button class="chip" data-f="all" style="${chipStyle(state.filter==="all")}">الكل</button>`;
  GROUPS.forEach(g=>chips+=`<button class="chip" data-f="${g}" style="${chipStyle(state.filter===g)}">${g}</button>`);
  return `
  <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px">${chips}</div>
  <div style="display:grid;gap:14px">${vis.map(card).join("")}</div>
  <div style="text-align:center;font-size:13px;color:#5a6b63;background:#fff;padding:16px;border-radius:14px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)">
    <b>نظام النقاط:</b> نتيجة مظبوطة <span style="background:#d3f3e2;color:#0a7d4f;padding:1px 7px;border-radius:6px;font-weight:800">+3</span> · الفايز صح والنتيجة غلط <span style="background:#fcefc7;color:#9a7b10;padding:1px 7px;border-radius:6px;font-weight:800">+1</span> · غلط <span style="background:#eee;color:#999;padding:1px 7px;border-radius:6px;font-weight:800">0</span>
  </div>`;
}
function chipStyle(on){return `flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid ${on?G:"#d5d8cf"};background:${on?G:"#fff"};color:${on?CREAM:"#6a766f"};font-weight:${on?800:700};font-size:14px`}

function card(m){
  const[home,hf]=T[m.home],[away,af]=T[m.away];
  const res=state.results[m.id];
  const fin=res&&res.h!=null;
  const myPred=state.predictions[state.me]?.[m.id];
  const myScore=scoreP(myPred,res);
  const isAdmin=state.me===ADMIN;
  const formOpen=openForms[m.id]==="pred";
  const adminOpen=openForms[m.id]==="admin";

  let othersHtml="";
  if(fin){
    const others=PLAYERS.map(p=>({p,pr:state.predictions[p]?.[m.id]})).filter(x=>x.pr);
    if(others.length){
      othersHtml=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">`+others.map(({p,pr})=>{
        const sc=scoreP(pr,res);const col=sc===3?"#0a7d4f":sc===1?"#b8860b":"#aaa";
        const mine=p===state.me;
        return `<span style="background:${mine?"#e3f1ea":CREAM};${mine?`border:1px solid ${G}`:""};font-size:12px;padding:4px 10px;border-radius:9px;font-weight:700;color:#5a6b63">${esc(p)} ${pr.h}-${pr.a}<b style="color:${col};margin-right:3px">+${sc}</b></span>`;
      }).join("")+`</div>`;
    }
  }

  return `<div class="cardIn" style="background:${fin?"linear-gradient(180deg,#fff,#fbfdfb)":"#fff"};border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(10,60,40,.06);border:1px solid ${fin?"#dcefe4":"#eef0e8"}">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#8a9690;margin-bottom:12px">
      <span style="background:${G};color:${CREAM};padding:3px 11px;border-radius:9px;font-weight:800">المجموعة ${m.group}</span>
      <span style="font-weight:600">📅 ${m.date}</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px"><span style="font-size:36px;line-height:1">${hf}</span><span style="text-align:center;font-weight:800;font-size:14px;color:${GD}">${home}</span></div>
      <div style="min-width:70px;display:flex;justify-content:center">${fin?`<div style="font-size:26px;font-weight:900;color:${G};display:flex;align-items:center;gap:2px">${res.h}<span style="color:#c2cac5;margin:0 4px;font-size:20px">-</span>${res.a}</div>`:`<div style="color:#c2cac5;font-size:16px;font-weight:900;letter-spacing:1px">VS</div>`}</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px"><span style="font-size:36px;line-height:1">${af}</span><span style="text-align:center;font-weight:800;font-size:14px;color:${GD}">${away}</span></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px dashed #e0e4da;font-size:14px">
      ${myPred?`<span style="color:${GD}">توقعك: <b>${myPred.h} - ${myPred.a}</b>${fin?badge(myScore):""}</span>`:`<span style="color:#aab4ae;font-size:13px">⏳ ما توقعت بعد</span>`}
      ${!fin?`<button class="predBtn" data-id="${m.id}" style="background:${G};color:${CREAM};border:none;padding:8px 18px;border-radius:11px;font-weight:800;font-size:14px">${myPred?"✏️ تعديل":"🎯 توقّع"}</button>`:""}
    </div>
    ${formOpen&&!fin?predForm(m,home,away,hf,af,myPred):""}
    ${othersHtml}
    ${isAdmin?adminSection(m,res,fin,adminOpen):""}
  </div>`;
}
function badge(s){const bg=s===3?"#d3f3e2":s===1?"#fcefc7":"#eee";const c=s===3?"#0a7d4f":s===1?"#9a7b10":"#999";return `<span class="${s>0?"pulse":""}" style="display:inline-block;margin-right:8px;font-size:12px;padding:2px 9px;border-radius:9px;font-weight:900;background:${bg};color:${c}">+${s}</span>`}
function predForm(m,home,away,hf,af,mp){
  return `<div class="slideDown predForm" data-id="${m.id}" style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center;background:${CREAM};padding:12px;border-radius:12px">
    <span style="font-size:12px;color:#5a6b63;font-weight:700">${hf} ${home}</span>
    <input type="number" min="0" class="ph" value="${mp?.h??""}" style="${numStyle()}">
    <span style="font-weight:900;color:#aab">-</span>
    <input type="number" min="0" class="pa" value="${mp?.a??""}" style="${numStyle()}">
    <span style="font-size:12px;color:#5a6b63;font-weight:700">${away} ${af}</span>
    <button class="predSave" data-id="${m.id}" style="background:${GOLD};color:${GD};border:none;padding:9px 18px;border-radius:11px;font-weight:900">حفظ</button>
  </div>`;
}
function adminSection(m,res,fin,open){
  if(!open)return `<div style="margin-top:12px;padding-top:12px;border-top:2px dashed ${GOLD}"><button class="adminToggle" data-id="${m.id}" style="width:100%;background:transparent;color:${GOLDD};border:1.5px dashed ${GOLD};padding:9px;border-radius:11px;font-weight:800;font-size:13px">⚖️ ${fin?"تعديل النتيجة":"إدخال النتيجة الفعلية"}</button></div>`;
  return `<div style="margin-top:12px;padding-top:12px;border-top:2px dashed ${GOLD}"><div class="slideDown" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;background:#fdfaf0;padding:12px;border-radius:12px">
    <span style="font-size:13px;font-weight:800;color:${GOLDD}">النتيجة:</span>
    <input type="number" min="0" class="rh" value="${res?.h??""}" style="${numStyle()}">
    <span style="font-weight:900;color:#aab">-</span>
    <input type="number" min="0" class="ra" value="${res?.a??""}" style="${numStyle()}">
    <button class="adminSave" data-id="${m.id}" style="background:${G};color:${CREAM};border:none;padding:9px 16px;border-radius:11px;font-weight:800">اعتماد</button>
    <button class="adminCancel" data-id="${m.id}" style="background:transparent;color:#9aa6a0;border:none;padding:9px 8px;font-weight:700">إلغاء</button>
  </div></div>`;
}
function numStyle(){return `width:50px;padding:9px;text-align:center;border:1.5px solid #cdd2c8;border-radius:10px;font-size:17px;font-weight:800;font-family:inherit;color:${G}`}

function renderTable(st,finishedCount){
  const medals=["🥇","🥈","🥉"];const heights=[110,80,64];const orders=[1,0,2];
  let pod="";
  st.slice(0,3).forEach((s,i)=>{
    pod+=`<div style="display:flex;flex-direction:column;align-items:center;width:80px;order:${orders[i]}">
      <div style="font-weight:800;font-size:14px;margin-bottom:4px;color:${GD}">${esc(s.pl)}</div>
      <div style="font-size:26px;margin-bottom:4px">${medals[i]}</div>
      <div class="growBar" style="width:100%;height:${heights[i]}px;background:linear-gradient(180deg,${G},${GD});border-radius:10px 10px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px"><span style="color:${GOLD};font-weight:900;font-size:20px">${s.pts}</span></div>
    </div>`;
  });
  let rows="";
  st.forEach((s,i)=>{
    const lead=i===0&&s.pts>0;const me=s.pl===state.me;
    rows+=`<div style="display:flex;align-items:center;gap:12px;padding:13px 10px;border-bottom:1px solid #f0ede3;border-radius:12px;${lead?"background:linear-gradient(90deg,#fdf6e0,#fff)":""};${me?"box-shadow:inset 0 0 0 1.5px #e3f1ea":""}">
      <div style="width:30px;height:30px;border-radius:50%;background:${lead?GOLD:"#eef0e8"};color:${lead?GD:G};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0">${i+1}</div>
      <div style="flex:1;font-weight:800;color:${GD}">${esc(s.pl)}${me?`<span style="background:${G};color:${CREAM};font-size:10px;padding:1px 7px;border-radius:6px;margin-right:6px;font-weight:700">أنت</span>`:""}<div style="font-size:11px;color:#9aa6a0;font-weight:500;margin-top:2px">${s.exact} مظبوطة · ${s.dir} اتجاه · ${s.played} لعبها</div></div>
      <div style="font-size:26px;font-weight:900;color:${G};text-align:center;line-height:1">${s.pts}<span style="display:block;font-size:10px;color:#9aa6a0;font-weight:500">نقطة</span></div>
    </div>`;
  });
  return `<div style="background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 10px rgba(10,60,40,.06)">
    <h2 style="margin:0 0 18px;color:${G};font-weight:900;text-align:center">🏆 لوحة الصدارة</h2>
    <div style="display:flex;justify-content:center;align-items:flex-end;gap:10px;margin-bottom:26px;min-height:150px">${pod}</div>
    ${rows}
    ${finishedCount===0?`<p style="text-align:center;color:#9aa6a0;margin-top:20px;font-size:14px;line-height:1.8">لسا ما انتهت ولا مباراة 🕐<br>أول ما يحط الحَكَم نتيجة بتبان النقاط هنا.</p>`:""}
  </div>`;
}

function renderPick(root){
  let btns="";
  PLAYERS.forEach((p,i)=>{
    btns+=`<button class="pickBtn pop" data-p="${esc(p)}" style="animation-delay:${i*0.07}s;padding:18px;font-size:19px;font-weight:800;background:#fff;color:${G};border:2px solid ${G};border-radius:16px;display:flex;justify-content:center;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(10,92,62,.08)"><span>${esc(p)}</span>${p===ADMIN?`<span style="background:${GOLD};color:${GD};font-size:11px;padding:2px 8px;border-radius:8px;font-weight:800">الحَكَم</span>`:""}</button>`;
  });
  root.innerHTML=`<div style="max-width:440px;margin:0 auto;padding:50px 24px;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center">
    <div class="float" style="font-size:72px;display:inline-block">⚽</div>
    <h1 style="font-size:42px;margin:10px 0 0;color:${G};font-weight:900;letter-spacing:-1px">كأس الشقة</h1>
    <div style="font-size:22px;color:${GOLD};font-weight:900;letter-spacing:6px;margin-bottom:10px">2026</div>
    <p style="color:#5a6b63;margin-bottom:34px;font-size:15px;line-height:1.7">توقّعوا نتائج المونديال — واللي يجمع نقاط أكثر يكسب 🏆</p>
    <div style="font-size:14px;color:#8a9690;margin-bottom:14px;font-weight:700">مين أنت؟</div>
    <div style="display:grid;gap:12px">${btns}</div>
  </div>`;
  root.querySelectorAll(".pickBtn").forEach(b=>b.onclick=()=>pick(b.dataset.p));
}

function bind(){
  const root=document.getElementById("root");
  root.querySelector("#logout").onclick=logout;
  root.querySelectorAll(".tabBtn").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});
  root.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{state.filter=b.dataset.f;render()});
  root.querySelectorAll(".predBtn").forEach(b=>b.onclick=()=>{const id=b.dataset.id;openForms[id]=openForms[id]==="pred"?null:"pred";render()});
  root.querySelectorAll(".predSave").forEach(b=>b.onclick=()=>{
    const wrap=root.querySelector(`.predForm[data-id="${b.dataset.id}"]`);
    const h=wrap.querySelector(".ph").value,a=wrap.querySelector(".pa").value;
    if(h===""||a==="")return;openForms[b.dataset.id]=null;savePred(b.dataset.id,Number(h),Number(a));
  });
  root.querySelectorAll(".adminToggle").forEach(b=>b.onclick=()=>{openForms[b.dataset.id]="admin";render()});
  root.querySelectorAll(".adminCancel").forEach(b=>b.onclick=()=>{openForms[b.dataset.id]=null;render()});
  root.querySelectorAll(".adminSave").forEach(b=>b.onclick=()=>{
    const card=b.closest("div").parentElement;
    const rh=card.querySelector(".rh").value,ra=card.querySelector(".ra").value;
    openForms[b.dataset.id]=null;
    if(rh===""||ra==="")saveRes(b.dataset.id,null,null);else saveRes(b.dataset.id,Number(rh),Number(ra));
  });
}

render();
</script>
</body>
</html>
